<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Twitter Cover — Clément Seguin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1500px;
      height: 500px;
      overflow: hidden;
      background: #09090f;
    }

    .cover {
      width: 1500px;
      height: 500px;
      background: #09090f;
      position: relative;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    /* Background gradient blobs */
    .blob-1 {
      position: absolute;
      top: -120px;
      left: -80px;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, #4353ff44 0%, transparent 70%);
      animation: pulse 6s ease-in-out infinite;
    }

    .blob-2 {
      position: absolute;
      top: -80px;
      left: 250px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, #a259ff33 0%, transparent 70%);
      animation: pulse 8s ease-in-out infinite reverse;
    }

    .blob-3 {
      position: absolute;
      bottom: -150px;
      right: 200px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, #4353ff22 0%, transparent 70%);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }

    /* Subtle grain overlay */
    .grain {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
    }

    /* Left gradient bar */
    .accent-bar {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(to bottom, #4353ff, #a259ff);
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 10;
      padding: 0 100px 0 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .eyebrow-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4353ff;
    }

    .eyebrow-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: #4353ff;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .headline {
      font-family: 'Instrument Serif', serif;
      font-size: 72px;
      line-height: 1.05;
      color: #ffffff;
      letter-spacing: -1px;
    }

    .headline em {
      font-style: italic;
      background: linear-gradient(135deg, #4353ff, #a259ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      color: #9ca3af;
      font-weight: 400;
      line-height: 1.5;
      max-width: 520px;
    }

    /* Pills */
    .pills {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .pill {
      padding: 6px 16px;
      border-radius: 100px;
      border: 1px solid #1f2937;
      background: rgba(255,255,255,0.04);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #d1d5db;
      letter-spacing: 0.3px;
    }

    .pill.accent {
      border-color: #4353ff44;
      background: rgba(67, 83, 255, 0.1);
      color: #818cf8;
    }

    /* Right side — floating cards */
    .right {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: flex-end;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px 24px;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .card-icon.blue { background: rgba(67, 83, 255, 0.2); }
    .card-icon.purple { background: rgba(162, 89, 255, 0.2); }
    .card-icon.teal { background: rgba(20, 184, 166, 0.2); }

    .card-text {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .card-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #f9fafb;
    }

    .card-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: #6b7280;
    }

    /* Bottom domain */
    .domain {
      position: absolute;
      bottom: 28px;
      right: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #374151;
      font-weight: 500;
      letter-spacing: 0.5px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="cover">
    <!-- Glows -->
    <div class="blob-1"></div>
    <div class="blob-2"></div>
    <div class="blob-3"></div>
    <div class="grain"></div>
    <div class="accent-bar"></div>

    <div class="content">
      <!-- Left: text -->
      <div class="left">
        <div class="eyebrow">
          <div class="eyebrow-dot"></div>
          <span class="eyebrow-text">Webflow Expert & Builder</span>
        </div>

        <div class="headline">
          Building tools<br>for <em>makers.</em>
        </div>

        <div class="pills">
          <div class="pill accent">FlowVault</div>
          <div class="pill">Sites & Automations</div>
          <div class="pill">Templates</div>
          <div class="pill">Tools</div>
        </div>
      </div>

      <!-- Right: floating cards -->
      <div class="right">
        <div class="card">
          <div class="card-icon blue">🔒</div>
          <div class="card-text">
            <div class="card-title">FlowVault</div>
            <div class="card-sub">Webflow component marketplace</div>
          </div>
        </div>

        <div class="card">
          <div class="card-icon purple">🎨</div>
          <div class="card-text">
            <div class="card-title">Freelance Design</div>
            <div class="card-sub">Premium Webflow sites, 5-day delivery</div>
          </div>
        </div>

        <div class="card">
          <div class="card-icon teal">⚡</div>
          <div class="card-text">
            <div class="card-title">Tools & Templates</div>
            <div class="card-sub">Automations, integrations & more</div>
          </div>
        </div>
      </div>
    </div>

    <div class="domain">clement-seguin.fr</div>
  </div>
</body>
</html>
